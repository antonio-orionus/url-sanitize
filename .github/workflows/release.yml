name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
      - run: cargo package -p url-sanitize-core

  build-native:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: url-sanitize-x86_64-unknown-linux-gnu.tar.gz
            binary: url-sanitize
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: url-sanitize-aarch64-unknown-linux-gnu.tar.gz
            binary: url-sanitize
          - os: macos-14
            target: aarch64-apple-darwin
            archive: url-sanitize-aarch64-apple-darwin.tar.gz
            binary: url-sanitize
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: url-sanitize-x86_64-pc-windows-msvc.zip
            binary: url-sanitize.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build native binary
        run: cargo build --release -p url-sanitize --target "${{ matrix.target }}"
        shell: bash
      - name: Stage binary
        run: |
          set -euo pipefail
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          mkdir -p "dist/${{ matrix.target }}"
          cp "$src" "dist/${{ matrix.target }}/${{ matrix.binary }}"
          chmod +x "dist/${{ matrix.target }}/${{ matrix.binary }}" || true
        shell: bash
      - name: Smoke native binary
        run: |
          set -euo pipefail
          "dist/${{ matrix.target }}/${{ matrix.binary }}" --version
          "dist/${{ matrix.target }}/${{ matrix.binary }}" --json "https://example.com/?utm_source=x"
          printf '%s\n' "https://example.com/?utm_source=x" | "dist/${{ matrix.target }}/${{ matrix.binary }}" -
        shell: bash
      - name: Build release archive
        run: |
          set -euo pipefail
          mkdir -p release-assets
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path 'dist/${{ matrix.target }}/*' -DestinationPath 'release-assets/${{ matrix.archive }}'"
          else
            tar -czf "release-assets/${{ matrix.archive }}" -C "dist/${{ matrix.target }}" .
          fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-assets/*
  github-release:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Add installer scripts and checksums
        run: |
          cp scripts/install.sh release-assets/url-sanitize-installer.sh
          cp scripts/install.ps1 release-assets/url-sanitize-installer.ps1
          chmod +x release-assets/url-sanitize-installer.sh
          (cd release-assets && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g 'npm@^11.5.1'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish TypeScript npm packages
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./packages/core/package.json').version")"
          mkdir -p npm-packages

          publish_pkg() {
            pkg="$1"
            filter="$2"
            if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "$pkg@$VERSION already published; skipping"
              return
            fi
            rm -f npm-packages/*.tgz
            pnpm --filter "$filter" pack --pack-destination "$PWD/npm-packages"
            npm publish "$PWD"/npm-packages/*.tgz --access public
          }

          publish_pkg "@url-sanitize/core" "@url-sanitize/core"
          publish_pkg "@url-sanitize/clearurls" "@url-sanitize/clearurls"
          publish_pkg "@url-sanitize/cli" "@url-sanitize/cli"

  publish-crates:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Read crate version
        id: version
        run: |
          version="$(python3 -c 'import json, subprocess; data=json.loads(subprocess.check_output(["cargo", "metadata", "--no-deps", "--format-version=1"])); print(next(p["version"] for p in data["packages"] if p["name"] == "url-sanitize-core"))')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Publish url-sanitize-core to crates.io
        run: |
          if curl -fsSA "url-sanitize-release" "https://crates.io/api/v1/crates/url-sanitize-core/${{ steps.version.outputs.version }}" >/dev/null; then
            echo "url-sanitize-core ${{ steps.version.outputs.version }} already published; skipping"
          else
            cargo publish -p url-sanitize-core
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index propagation
        run: sleep 30
      - name: Publish url-sanitize to crates.io
        run: |
          if curl -fsSA "url-sanitize-release" "https://crates.io/api/v1/crates/url-sanitize/${{ steps.version.outputs.version }}" >/dev/null; then
            echo "url-sanitize ${{ steps.version.outputs.version }} already published; skipping"
          else
            cargo publish -p url-sanitize
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-pypi:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build Python package
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
