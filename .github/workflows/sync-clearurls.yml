name: sync-clearurls

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Fetch and verify upstream rules
        run: pnpm sync:clearurls

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet packages/clearurls/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.diff.outputs.changed == 'true'
        run: |
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          node scripts/bump-version.mjs "$NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        id: bump

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit-message: 'release: v${{ steps.bump.outputs.new_version }}'
          title: 'chore(clearurls): sync upstream rules → v${{ steps.bump.outputs.new_version }}'
          body: |
            Automated daily sync of ClearURLs rule catalog from
            https://rules2.clearurls.xyz/data.minify.json.
            SHA256 verified against rules.minify.hash.
          branch: clearurls-sync
          delete-branch: true

      - name: Enable auto-merge
        if: steps.diff.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
